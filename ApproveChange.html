<!DOCTYPE html>
<html>
<head>
  <title>Approve Change Request</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f3f2f1;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h2 { color: #323130; margin-bottom: 8px; }
    p { color: #605e5c; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">Submitting...</h2>
    <p id="status"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get("itemId");

    async function submitApproval() {
      try {
        const response = await fetch("https://default2b2bb9727e504d82af6d352bddc5bd.b1.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/814de963ffe148a2b6540385dd375d10/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=BG73NUe_Y8UVxmG3WbKTo_myX7UKRrTQ1g2WheHdA0U", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            itemId: itemId,
            userUPN: document.currentScript
          })
        });

        if (response.ok) {
          document.getElementById("title").innerText = "Approval submitted!";
          setTimeout(() => window.close(), 2000);
        } else {
          document.getElementById("title").innerText = "Something went wrong";
          document.getElementById("status").innerText = "Please try approving directly in the Change Management list.";
        }
      } catch (err) {
        document.getElementById("title").innerText = "Error";
        document.getElementById("status").innerText = err.message;
      }
    }

    submitApproval();
  </script>
</body>
</html>
